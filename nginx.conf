##
## Nginx Config — Zachi Smart-POS on Hostinger VPS
## Place this file at: /etc/nginx/sites-available/zachipos
## Then: ln -s /etc/nginx/sites-available/zachipos /etc/nginx/sites-enabled/
## Then: nginx -t && systemctl reload nginx
##
## Replace 'yourdomain.com' with 'pos.zachicomputercentre.com'
## Node app runs on port 5000 via PM2
##

server {
    listen 80;
    server_name pos.zachicomputercentre.com;

    # Redirect HTTP → HTTPS (uncomment after setting up SSL with certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Forward real IP to Node app
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Increase timeouts for large file uploads
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Serve static files directly (bypass Node for performance)
    location /css/ {
        root /var/www/zachipos/public;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location /js/ {
        root /var/www/zachipos/public;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location /logo.jpg {
        root /var/www/zachipos/public;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Gzip compression for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # Maximum upload size (for product images, etc.)
    client_max_body_size 50M;
}

